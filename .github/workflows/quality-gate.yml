name: 🛡️ Quality Gate

on:
  push:
    branches: [ "main", "develop", "feat/*", "fix/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐷 TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  analyze-and-test:
    needs: security
    name: 📊 Analysis & Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      
      - name: 🔍 Verify Dart Version
        run: dart --version 
        
      - name: 📦 Install Dependencies
        run: dart pub get

      - name: 🔍 Verify Formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: 🧪 Static Analysis
        run: dart analyze --fatal-infos

      - name: ⚡ Run Unit Tests
        run: dart test --reporter=json --exclude-tags=integration > test-results.json || true
      
      - name: 📊 Get Test Count
        id: test_count
        if: always()
        run: |
          # O jq agora processa o arquivo que foi gerado, independente do sucesso do comando anterior
          PASSED=$(grep "^{" test-results.json | jq -s '[.[] | select(.type=="testDone" and .result=="success")] | length' || echo "0")
          TOTAL=$(grep "^{" test-results.json | jq -s '[.[] | select(.type=="testDone")] | length' || echo "0")
          
          echo "total=$PASSED" >> $GITHUB_OUTPUT
          echo "📊 Testes que passaram: $PASSED de $TOTAL"
          
      - name: 🛡️ Create Test Badge
        if: always()
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: d089a6ba4882701dbca635367b01e9b2
          filename: test-results.json
          label: Tests
          message: "${{ steps.test_count.outputs.total }} passed"
          color: green